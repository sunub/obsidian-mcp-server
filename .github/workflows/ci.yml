# .github/workflows/ci.yml

name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish Packages
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: write
      id-token: write
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # 추가된 단계
      - name: Install canvas build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: |
          bun run --cwd packages/core build
          bun run --cwd packages/server build
          bun run --cwd packages/cli build

      - name: Get Version Tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Sync package versions from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          # 모든 공개 패키지의 버전을 태그와 동기화
          node -e "
            const fs = require('fs');
            const pkgs = ['packages/core/package.json', 'packages/server/package.json'];
            for (const p of pkgs) {
              const json = JSON.parse(fs.readFileSync(p, 'utf8'));
              json.version = '${VERSION}';
              fs.writeFileSync(p, JSON.stringify(json, null, 2) + '\n');
              console.log(p + ' -> ' + '${VERSION}');
            }
          "

      - name: Publish NPM Packages
        run: |
          # 1. 토큰 존재 여부 확인
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN is empty! Please check GitHub Secrets."
            exit 1
          fi

          # 2. 명시적으로 .npmrc 생성
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc

          # 3. core 버전 추출
          CORE_VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "Core version: $CORE_VERSION"

          # 4. core 패키지 배포 (server의 런타임 의존성)
          cd packages/core
          npm publish --access public --no-git-checks || echo "core@$CORE_VERSION already published, skipping..."
          cd ../..

          # 5. server의 workspace:* 를 실제 버전으로 치환
          cd packages/server
          sed -i "s/\"workspace:\*\"/\"^${CORE_VERSION}\"/g" package.json
          echo "Resolved workspace:* -> ^$CORE_VERSION in server/package.json"

          # 6. server 패키지 배포
          npm publish --access public --no-git-checks
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          generate_release_notes: true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # 추가된 단계
      - name: Install canvas build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: |
          bun run --cwd packages/core build
          bun run --cwd packages/server build
          bun run --cwd packages/cli build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/core/build/
            packages/server/dist/
            packages/cli/build/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # 추가된 단계
      - name: Install canvas build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # 추가된 단계
      - name: Install canvas build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: packages/

      - name: Create test vault directory
        run: mkdir -p test-vault

      - name: Test
        run: bun run test --poolOptions.threads.singleThread
        env:
          VAULT_DIR_PATH: ${{ github.workspace }}/test-vault
          NODE_ENV: test
